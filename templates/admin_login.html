<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(160deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1e293b;
    }
    .card {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      padding: 1.2rem;
    }
    h1 {
      margin: 0 0 0.9rem;
      font-size: 1.15rem;
      color: #0f172a;
      text-align: center;
    }
    .desc {
      margin: 0 0 0.9rem;
      color: #64748b;
      font-size: 0.88rem;
      text-align: center;
    }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: #334155;
    }
    input[type="password"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }
    .error {
      margin-bottom: 0.75rem;
      color: #b91c1c;
      font-size: 0.85rem;
      min-height: 1.1rem;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem;
      cursor: pointer;
    }
    .btn:hover { background: #1d4ed8; }
    .back {
      display: block;
      margin-top: 0.7rem;
      text-align: center;
      color: #64748b;
      text-decoration: none;
      font-size: 0.82rem;
    }
    .back:hover { color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h1>관리자 로그인</h1>
    <p class="desc">관리자 비밀번호를 입력하세요.</p>
    <form method="post" action="/admin/login">
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" required autofocus>
      <div class="error">{{ error }}</div>
      <button type="submit" class="btn">입장</button>
    </form>
    <a href="/" class="back">메인으로 돌아가기</a>
  </div>
</body>
</html>
